services:
  hugo:
    image: hugomods/hugo:exts-non-root
    volumes:
      - ./site:/src
    ports:
      - "1313:1313"
    command: server --bind 0.0.0.0 --baseURL http://localhost:1313/ --disableFastRender

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pathogens
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d pathogens"]
      interval: 5s
      timeout: 5s
      retries: 5

  pipeline:
    profiles: ["pipeline"]
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./scripts:/app
      - ./data:/data
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: pathogens
      DB_USER: portal
      DB_PASSWORD: portal_dev
    entrypoint: ["python", "placeholder.py"]
    depends_on:
      postgres:
        condition: service_healthy

  nextstrain:
    profiles: ["nextstrain"]
    image: nextstrain/base:latest
    volumes:
      - ./nextstrain:/nextstrain
    working_dir: /nextstrain
    entrypoint: ["bash"]

volumes:
  postgres_data:
