{{/* Czech Republic NUTS3 choropleth map
     Usage: {{< region-map id="myMap" src="/data/charts/isin_regional_map.json" title="Titulek" >}}
*/}}
{{ $id    := .Get "id" }}
{{ $src   := .Get "src" }}
{{ $title := .Get "title" | default "" }}

<div class="region-map-wrapper my-4">
  {{ with $title }}<h5 class="chart-title">{{ . }}</h5>{{ end }}
  <div id="{{ $id }}-legend" class="d-flex justify-content-between align-items-center mb-2 small text-muted" style="max-width:680px;margin:0 auto;">
    <span>méně případů</span>
    <div id="{{ $id }}-gradient" style="flex:1;height:12px;margin:0 12px;border-radius:4px;background:linear-gradient(to right,#cfe2ff,#0d3b80);"></div>
    <span>více případů</span>
  </div>
  <div style="max-width:680px;margin:0 auto;position:relative;">
    <svg id="{{ $id }}" viewBox="0 0 900 620" style="width:100%;height:auto;display:block;" aria-label="Mapa krajů České republiky">
      <!-- Czech Republic NUTS3 regions — simplified paths -->
      <!-- CZ010 Praha -->
      <path id="{{ $id }}-CZ010" d="M 390 228 L 404 218 L 418 224 L 422 238 L 412 250 L 396 248 Z" stroke="#fff" stroke-width="2" />
      <!-- CZ020 Středočeský -->
      <path id="{{ $id }}-CZ020" d="M 340 190 L 390 170 L 450 178 L 470 200 L 460 240 L 422 238 L 418 224 L 404 218 L 390 228 L 396 248 L 412 250 L 408 270 L 380 280 L 350 272 L 330 252 L 318 230 L 330 210 Z" stroke="#fff" stroke-width="2" />
      <!-- CZ031 Jihočeský -->
      <path id="{{ $id }}-CZ031" d="M 280 300 L 318 280 L 350 272 L 380 280 L 408 270 L 420 300 L 410 340 L 390 370 L 350 390 L 300 380 L 270 350 L 260 320 Z" stroke="#fff" stroke-width="2" />
      <!-- CZ032 Plzeňský -->
      <path id="{{ $id }}-CZ032" d="M 200 230 L 240 210 L 280 200 L 318 210 L 330 230 L 318 252 L 280 268 L 260 290 L 230 300 L 200 290 L 185 265 L 190 245 Z" stroke="#fff" stroke-width="2" />
      <!-- CZ041 Karlovarský -->
      <path id="{{ $id }}-CZ041" d="M 160 160 L 200 148 L 240 155 L 260 178 L 250 200 L 230 212 L 200 210 L 175 195 L 158 178 Z" stroke="#fff" stroke-width="2" />
      <!-- CZ042 Ústecký -->
      <path id="{{ $id }}-CZ042" d="M 240 155 L 290 140 L 340 148 L 360 168 L 340 190 L 318 198 L 290 190 L 270 178 L 258 162 Z" stroke="#fff" stroke-width="2" />
      <!-- CZ051 Liberecký -->
      <path id="{{ $id }}-CZ051" d="M 380 138 L 420 130 L 458 140 L 470 160 L 458 178 L 430 185 L 400 180 L 380 168 L 370 155 Z" stroke="#fff" stroke-width="2" />
      <!-- CZ052 Královéhradecký -->
      <path id="{{ $id }}-CZ052" d="M 458 140 L 510 132 L 548 148 L 558 170 L 540 190 L 510 198 L 478 192 L 458 178 L 462 160 Z" stroke="#fff" stroke-width="2" />
      <!-- CZ053 Pardubický -->
      <path id="{{ $id }}-CZ053" d="M 470 200 L 510 198 L 548 210 L 562 232 L 548 252 L 520 262 L 490 258 L 468 240 L 462 220 Z" stroke="#fff" stroke-width="2" />
      <!-- CZ063 Vysočina -->
      <path id="{{ $id }}-CZ063" d="M 408 270 L 460 260 L 500 268 L 520 295 L 510 330 L 488 350 L 450 358 L 418 348 L 400 320 L 406 295 Z" stroke="#fff" stroke-width="2" />
      <!-- CZ064 Jihomoravský -->
      <path id="{{ $id }}-CZ064" d="M 500 268 L 548 260 L 590 272 L 620 300 L 618 340 L 598 368 L 560 380 L 520 372 L 492 352 L 488 322 L 500 300 Z" stroke="#fff" stroke-width="2" />
      <!-- CZ071 Olomoucký -->
      <path id="{{ $id }}-CZ071" d="M 548 210 L 600 200 L 638 218 L 652 242 L 638 268 L 610 278 L 578 272 L 552 258 L 548 236 Z" stroke="#fff" stroke-width="2" />
      <!-- CZ072 Zlínský -->
      <path id="{{ $id }}-CZ072" d="M 590 272 L 638 268 L 672 282 L 680 310 L 660 335 L 630 342 L 600 335 L 580 312 L 580 290 Z" stroke="#fff" stroke-width="2" />
      <!-- CZ080 Moravskoslezský -->
      <path id="{{ $id }}-CZ080" d="M 638 218 L 690 205 L 740 218 L 758 248 L 745 278 L 715 292 L 680 290 L 655 272 L 640 248 Z" stroke="#fff" stroke-width="2" />

      <!-- Region labels -->
      <text x="403" y="240" text-anchor="middle" font-size="9" fill="#333" pointer-events="none">Praha</text>
      <text x="388" y="225" text-anchor="middle" font-size="8" fill="#333" pointer-events="none">Stř. Čechy</text>
      <text x="345" y="335" text-anchor="middle" font-size="9" fill="#333" pointer-events="none">Jihočeský</text>
      <text x="248" y="252" text-anchor="middle" font-size="9" fill="#333" pointer-events="none">Plzeňský</text>
      <text x="200" y="182" text-anchor="middle" font-size="9" fill="#333" pointer-events="none">Karlovarský</text>
      <text x="300" y="165" text-anchor="middle" font-size="9" fill="#333" pointer-events="none">Ústecký</text>
      <text x="415" y="160" text-anchor="middle" font-size="9" fill="#333" pointer-events="none">Liberecký</text>
      <text x="503" y="165" text-anchor="middle" font-size="9" fill="#333" pointer-events="none">Král. Hr.</text>
      <text x="512" y="232" text-anchor="middle" font-size="9" fill="#333" pointer-events="none">Pardubický</text>
      <text x="458" y="315" text-anchor="middle" font-size="9" fill="#333" pointer-events="none">Vysočina</text>
      <text x="555" y="325" text-anchor="middle" font-size="9" fill="#333" pointer-events="none">Jihomoravský</text>
      <text x="595" y="242" text-anchor="middle" font-size="9" fill="#333" pointer-events="none">Olomoucký</text>
      <text x="628" y="308" text-anchor="middle" font-size="9" fill="#333" pointer-events="none">Zlínský</text>
      <text x="690" y="252" text-anchor="middle" font-size="9" fill="#333" pointer-events="none">Moravskoslezský</text>
    </svg>

    <!-- Tooltip -->
    <div id="{{ $id }}-tooltip" style="
      display:none;position:absolute;background:rgba(0,0,0,0.82);color:#fff;
      padding:6px 10px;border-radius:6px;font-size:13px;pointer-events:none;
      white-space:nowrap;z-index:10;
    "></div>
  </div>
</div>

<script>
(function(){
  var mapId   = {{ $id }};
  var src     = {{ $src }};

  function lerp(a, b, t) { return a + (b - a) * t; }

  function colorForValue(val, min, max) {
    if (max === min) return "#6ea8fe";
    var t = (val - min) / (max - min);
    // light blue → dark navy
    var r = Math.round(lerp(207, 13, t));
    var g = Math.round(lerp(226, 59, t));
    var b = Math.round(lerp(255, 128, t));
    return "rgb(" + r + "," + g + "," + b + ")";
  }

  function render(data) {
    var regions = data.regions || {};
    var labels  = data.labels  || {};
    var values  = Object.values(regions).filter(function(v){ return v > 0; });
    var min = Math.min.apply(null, values);
    var max = Math.max.apply(null, values);

    var svg     = document.getElementById(mapId);
    var tooltip = document.getElementById(mapId + "-tooltip");
    if (!svg) return;

    Object.keys(regions).forEach(function(code) {
      var path = document.getElementById(mapId + "-" + code);
      if (!path) return;
      var val = regions[code] || 0;
      path.style.fill = colorForValue(val, min, max);
      path.style.cursor = "pointer";

      path.addEventListener("mouseenter", function(e) {
        path.style.opacity = "0.8";
        tooltip.style.display = "block";
        tooltip.textContent = (labels[code] || code) + ": " + val.toLocaleString("cs-CZ") + " případů (" + data.year + ")";
      });
      path.addEventListener("mousemove", function(e) {
        var rect = svg.closest("div").getBoundingClientRect();
        tooltip.style.left = (e.clientX - rect.left + 10) + "px";
        tooltip.style.top  = (e.clientY - rect.top  - 30) + "px";
      });
      path.addEventListener("mouseleave", function() {
        path.style.opacity = "1";
        tooltip.style.display = "none";
      });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      fetch(src).then(function(r){ return r.json(); }).then(render);
    });
  } else {
    fetch(src).then(function(r){ return r.json(); }).then(render);
  }
})();
</script>
