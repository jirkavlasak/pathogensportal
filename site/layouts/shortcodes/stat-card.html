{{/* Usage: {{< stat-card src="/data/charts/covid_summary.json" >}} */}}
{{ $src := .Get "src" }}
<div id="stat-cards-{{ md5 $src }}" class="row g-3 my-3">
  <div class="col-12 text-muted small">Načítám statistiky…</div>
</div>
<script>
(function(){
  var containerId = "stat-cards-{{ md5 $src }}";
  function fmt(n) { return n ? n.toLocaleString('cs-CZ') : '—'; }
  fetch({{ $src }}).then(function(r){ return r.json(); }).then(function(d){
    var el = document.getElementById(containerId);
    el.innerHTML = [
      ['Celkem nakažených', d.celkem_nakazenych, '#0d6efd'],
      ['Celkem úmrtí',      d.celkem_umrti,      '#dc3545'],
      ['Celkem testů',      d.celkem_testu,      '#198754'],
    ].map(function(item){
      return '<div class="col-sm-4"><div class="card text-white h-100" style="background:' + item[2] + '">'
        + '<div class="card-body"><div class="fs-4 fw-bold">' + fmt(item[1]) + '</div>'
        + '<div class="card-text small">' + item[0] + '</div>'
        + '<div class="card-text" style="font-size:0.7rem;opacity:0.8">k ' + (d.posledni_datum||'') + '</div>'
        + '</div></div></div>';
    }).join('');
  });
})();
</script>
